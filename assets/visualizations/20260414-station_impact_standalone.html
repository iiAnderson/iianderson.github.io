  if (Math.abs(n) >= 1e3) return (n/1e3).toFixed(1)+'K';

};

            </select>
            <label>Sort by:</label>
            <select value={sortBy} onChange={e=>setSortBy(e.target.value)}>
              <option value="ta">Total Affected</option>
              <option value="cs">Cancelled Services</option>
              <option value="aps">Affected Per Service</option>
            </select>
          </>}
        </div>
        <h2>{view==='bar' ? `Top ${topN} Stations by ${sortLabel[sortBy]||'Total Affected'}` : 'Cancelled Services vs Passengers Affected'}</h2>

        {view==='bar' ? (
          <ResponsiveContainer width="100%" height={Math.max(400, topN*26)}>
            <BarChart data={chartData} layout="vertical" margin={{left:200,right:30,top:5,bottom:5}}>
              <CartesianGrid strokeDasharray="3 3" horizontal={false}/>
              <XAxis type="number" tickFormatter={fmt}/>
              <YAxis type="category" dataKey="n" width={190} tick={{fontSize:11}} interval={0}/>
              <Tooltip formatter={v=>fmt(v)} labelStyle={{fontWeight:600}}/>
              <Bar dataKey={sortBy} fill="#2563eb" radius={[0,4,4,0]} />
            </BarChart>
          </ResponsiveContainer>
        ) : (
          <div>
            <p style={{fontSize:12,color:'#6b7280',marginBottom:8}}>Dot size = passengers affected per service. Log scale on both axes.</p>
            <ResponsiveContainer width="100%" height={500}>
              <ScatterChart margin={{top:20,right:30,bottom:40,left:60}}>
                <CartesianGrid strokeDasharray="3 3"/>
                <XAxis type="number" dataKey="x" name="Cancelled Services" scale="log" domain={['auto','auto']} tickFormatter={fmt}
                  label={{value:'Cancelled Services',position:'bottom',offset:20,style:{fontSize:12}}}/>
                <YAxis type="number" dataKey="y" name="Total Affected" scale="log" domain={['auto','auto']} tickFormatter={fmt}
                  label={{value:'Total Passengers Affected',angle:-90,position:'left',offset:40,style:{fontSize:12}}}/>
                <ZAxis type="number" dataKey="z" range={[15,500]} name="Per Service"/>
                <Tooltip content={({active,payload})=>{
                  if(!active||!payload?.length) return null;
                  const d=payload[0].payload;
                  return <div style={{background:'#fff',border:'1px solid #e5e7eb',borderRadius:8,padding:'8px 12px',boxShadow:'0 4px 6px rgba(0,0,0,.1)'}}>
                    <p style={{fontWeight:600,marginBottom:4}}>{d.name} ({d.code})</p>
                    <p style={{fontSize:12,color:'#2563eb'}}>Affected: {fmt(d.y)}</p>
                    <p style={{fontSize:12}}>Services: {fmt(d.x)}</p>
                    <p style={{fontSize:12}}>Per Service: {d.aps.toFixed(1)}</p>
                  </div>;
                }}/>
                <Scatter data={scatterData} fill="#2563eb" fillOpacity={0.5}/>
              </ScatterChart>
            </ResponsiveContainer>
          </div>
        )}
      </div>

      <div className="card">
        <h2>All Stations</h2>
        <input className="search-box" placeholder="Search by station name or code..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <div style={{maxHeight:500,overflow:'auto'}}>
          <table>
            <thead><tr>
              <th onClick={()=>setSortBy('n')}>Station {sortBy==='n'?'▲':''}</th>
              <th onClick={()=>setSortBy('ta')}>Total Affected {sortBy==='ta'?'▼':''}</th>
              <th onClick={()=>setSortBy('cs')}>Services {sortBy==='cs'?'▼':''}</th>
              <th onClick={()=>setSortBy('aps')}>Per Service {sortBy==='aps'?'▼':''}</th>
              <th onClick={()=>setSortBy('aa')}>Arrivals {sortBy==='aa'?'▼':''}</th>
              <th onClick={()=>setSortBy('da')}>Departures {sortBy==='da'?'▼':''}</th>
            </tr></thead>
            <tbody>
              {filtered.slice(0,200).map(d =>
                <tr key={d.s}>
                  <td><strong style={{color:'#2563eb'}}>{d.s}</strong> {d.n.replace(' Rail Station','')}</td>
                  <td>{fmt(d.ta)}</td>
                  <td>{d.cs.toLocaleString()}</td>
                  <td>{d.aps.toFixed(1)}</td>
                  <td>{fmt(d.aa)}</td>
                  <td>{fmt(d.da)}</td>
                </tr>
              )}
            </tbody>
          </table>
        </div>
        {filtered.length > 200 && <p style={{fontSize:12,color:'#6b7280',marginTop:8}}>Showing 200 of {filtered.length} stations. Use search to filter.</p>}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
